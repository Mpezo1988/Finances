<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --card: #151920;
    --card-border: #1e2430;
    --text: #e8eaf0;
    --text-muted: #7a8299;
    --accent: #4ade80;
    --accent2: #38bdf8;
    --accent3: #f472b6;
    --accent4: #fbbf24;
    --accent5: #a78bfa;
    --accent6: #fb923c;
    --red: #f87171;
    --green: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .noise { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px; }
  .dashboard { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8eaf0, #7a8299); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .subtitle { color: var(--text-muted); font-size: 0.85rem; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .toolbar-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); border-radius: 8px; padding: 6px 14px; font-size: 0.74rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .toolbar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.15); }
  .toolbar-btn.danger:hover { border-color: rgba(248,113,113,0.4); color: var(--red); }
  .toolbar-btn svg { width: 13px; height: 13px; }
  .save-indicator { font-size: 0.72rem; color: var(--accent); opacity: 0; transition: opacity 0.3s; margin-left: 4px; }
  .save-indicator.show { opacity: 1; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 22px 20px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; }
  .kpi:nth-child(1)::before { background: var(--accent); }
  .kpi:nth-child(2)::before { background: var(--accent3); }
  .kpi:nth-child(3)::before { background: var(--accent2); }
  .kpi:nth-child(4)::before { background: var(--accent4); }
  .kpi:nth-child(5)::before { background: var(--accent5); }
  .kpi:nth-child(6)::before { background: var(--accent6); }
  .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
  .kpi-value { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.5px; }
  .kpi-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 28px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; animation: fadeUp 0.6s ease both; position: relative; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 8px; }
  .card-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; margin: 0; }
  .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .edit-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); border-radius: 8px; padding: 5px 12px; font-size: 0.72rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .edit-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .edit-btn svg { width: 12px; height: 12px; }
  .donut-container { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .donut-svg { width: 200px; height: 200px; transform: rotate(-90deg); flex-shrink: 0; }
  .donut-center-text { transform: rotate(90deg); font-family: 'DM Sans', sans-serif; }
  .legend { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 160px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.82rem; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-color { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-value { font-weight: 600; white-space: nowrap; }
  .bar-chart { display: flex; flex-direction: column; gap: 14px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { width: 130px; font-size: 0.78rem; color: var(--text-muted); text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 28px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 0.75rem; font-weight: 600; color: rgba(0,0,0,0.7); min-width: fit-content; }
  .bar-amount { margin-left: 8px; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
  .full-width { grid-column: 1 / -1; }
  .property-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
  .property-card { background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); border-radius: 12px; padding: 18px; }
  .property-name { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
  .property-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; }
  .property-row span:first-child { color: var(--text-muted); }
  .equity-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .equity-fill { height: 100%; border-radius: 3px; }
  .gauge-container { display: flex; flex-direction: column; align-items: center; }
  .gauge-svg { width: 220px; height: 130px; }
  .dti-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 16px; }
  .dti-item { text-align: center; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; }
  .dti-item-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .dti-item-value { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }
  .stacked-bar-section { margin-top: 16px; }
  .stacked-bar-outer { display: flex; height: 36px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .stacked-bar-outer > div { display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: rgba(0,0,0,0.7); min-width: 2%; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(4px); justify-content: center; align-items: flex-start; padding: 60px 20px; overflow-y: auto; }
  .modal-overlay.active { display: flex; }
  .modal { background: #1a1f28; border: 1px solid var(--card-border); border-radius: 20px; padding: 28px; width: 100%; max-width: 580px; max-height: 80vh; overflow-y: auto; }
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .modal h2 { font-size: 1.05rem; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--text); }
  .modal h2 svg { width: 16px; height: 16px; color: var(--accent2); }
  .edit-section-label { font-size: 0.72rem; color: var(--accent2); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(56,189,248,0.15); font-weight: 600; }
  .edit-section-label:first-of-type { margin-top: 0; }
  .edit-header { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 4px; }
  .edit-header .eh-name { flex: 1; }
  .edit-header .eh-val { width: 100px; text-align: right; }
  .edit-header .eh-del { width: 28px; }
  .edit-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .edit-row input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text); padding: 8px 10px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
  .edit-row input:focus { border-color: var(--accent2); background: rgba(56,189,248,0.05); }
  .edit-row .edit-name { flex: 1; min-width: 0; }
  .edit-row .edit-val { width: 100px; text-align: right; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 18px; }
  .btn { padding: 9px 22px; border-radius: 10px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
  .btn-save { background: var(--accent2); color: #000; }
  .btn-save:hover { background: #60cbfb; transform: translateY(-1px); }
  .btn-cancel { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
  .btn-cancel:hover { background: rgba(255,255,255,0.1); }
  .btn-add { background: rgba(74,222,128,0.08); color: var(--accent); border: 1px solid rgba(74,222,128,0.15); padding: 6px 14px; font-size: 0.76rem; margin-top: 4px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.2s; }
  .btn-add:hover { background: rgba(74,222,128,0.15); }
  .btn-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.1rem; padding: 4px 8px; opacity: 0.4; transition: opacity 0.2s; line-height: 1; }
  .btn-del:hover { opacity: 1; }

  /* Confirm dialog */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; }
  .confirm-overlay.active { display: flex; }
  .confirm-box { background: #1a1f28; border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; max-width: 380px; text-align: center; }
  .confirm-box p { margin-bottom: 18px; font-size: 0.9rem; line-height: 1.5; }
  .confirm-box .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .confirm-box .btn-danger { background: var(--red); color: #000; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="dashboard">
  <div class="header">
    <h1>Monthly Finance Dashboard</h1>

  </div>
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" onclick="exportData()" title="Download a backup of your data">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Backup
    </button>
    <button class="toolbar-btn" onclick="document.getElementById('importFile').click()" title="Load data from a backup file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import Backup
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="toolbar-btn danger" onclick="confirmReset()" title="Reset all data to original values">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Reset to Default
    </button>
    <span class="save-indicator" id="saveIndicator">✓ Saved</span>
  </div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="chart-grid" id="chartGrid"></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>Reset all data to the original defaults?<br><span style="color:var(--text-muted);font-size:0.8rem">This will erase all your edits. Consider exporting a backup first.</span></p>
    <div class="confirm-actions">
      <button class="btn btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<script>
const fmt = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
const fmtD = n => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const pencilSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`;
const palette = ['#4ade80','#38bdf8','#f472b6','#fbbf24','#a78bfa','#fb923c','#67e8f9','#e879f9','#34d399','#f9a8d4','#fde68a','#c4b5fd','#4ade80','#38bdf8','#f472b6','#fbbf24'];
const STORAGE_KEY = 'finDashboardData_v1';

// ========== DEFAULT DATA ==========
function getDefaults() {
  return {
    income: [
      { name: "Mike's Income", value: 10394 },
      { name: "Brenna's Income", value: 5131 },
      { name: 'Sober House', value: 4000 },
      { name: '681 Ballard Rent', value: 2080 },
    ],
    monthlyBills: [
      { name: '275 Marion', value: 4074 },
      { name: 'Mike Taxes', value: 2573 },
      { name: '681 Ballard', value: 1623.45 },
      { name: 'Yacht Club', value: 994.83 },
      { name: 'Groceries', value: 900 },
      { name: 'Babysitter', value: 800 },
      { name: '401K/HSA', value: 823.64 },
      { name: 'Health Ins./Deductions', value: 600 },
      { name: 'S Corp Taxes', value: 600 },
      { name: 'Utilities', value: 331 },
      { name: 'Golf Cart', value: 279.25 },
      { name: 'Camila 529 & Custodial', value: 265 },
      { name: 'Korpez Loan', value: 234 },
      { name: 'HELOC', value: 196 },
      { name: 'Car/Cart Ins.', value: 196 },
      { name: 'Crossfit/GYM', value: 150 },
      { name: 'House Cleaning', value: 140 },
      { name: 'Dog Food', value: 67 },
      { name: 'Household', value: 21.24 },
    ],
    mikePersonal: [
      { name: 'Car Payment', value: 400 },
      { name: 'Credit Card', value: 400 },
      { name: 'Gas', value: 100 },
      { name: 'Spectrum', value: 85 },
      { name: 'App Subscriptions', value: 70 },
      { name: 'Car Wash', value: 12 },
    ],
    brennaPersonal: [
      { name: 'Car Payment', value: 296 },
      { name: 'Gas', value: 150 },
    ],
    debt: [
      { name: 'HELOC Loan', balance: 28836, payment: 184 },
      { name: 'Audi', balance: 12365, payment: 265 },
      { name: 'Mike Credit', balance: 10535, payment: 375 },
      { name: 'Golf Cart', balance: 8300, payment: 279 },
      { name: 'VW', balance: 5400, payment: 365 },
      { name: 'Korpez Loan', balance: 3375, payment: 234 },
      { name: 'Brenna Credit', balance: 1500, payment: 100 },
    ],
    assets: [
      { name: 'T. Rowe Price', value: 22030 },
      { name: 'Robinhood MP', value: 7993 },
      { name: 'Seacoast', value: 6345 },
      { name: 'Acorns', value: 4489 },
      { name: 'Florida Prepaid', value: 2875 },
      { name: 'HSA', value: 2495 },
      { name: 'Seacoast Vista', value: 2150 },
      { name: 'Banco Estado', value: 2011 },
      { name: 'Seacoast Savings', value: 1750 },
      { name: 'Coinbase MP', value: 1650 },
      { name: 'Robinhood BP', value: 1625 },
      { name: 'Coinbase BP', value: 1045 },
      { name: 'Korpez', value: 389 },
      { name: 'Seacoast BP', value: 100 },
    ],
    properties: [
      { name: '681 Ballard', mortgage: 204680, appraised: 346959, market: 410000 },
      { name: '275 Marion', mortgage: 528287, appraised: 563000, market: 575000 },
    ],
    spendingCategories: {
      Housing: ['275 Marion', '681 Ballard'],
      Taxes: ['Mike Taxes', 'S Corp Taxes'],
      Lifestyle: ['Groceries', 'Babysitter', 'Yacht Club', 'Crossfit/GYM', 'House Cleaning', 'Dog Food', 'Household'],
      'Debt Payments': ['_DEBT_TOTAL_'],
      Insurance: ['Car/Cart Ins.', 'Health Ins./Deductions'],
      Investments: ['401K/HSA', 'Camila 529 & Custodial'],
      'Personal Bills': ['_PERSONAL_NON_DEBT_'],
      Utilities: ['Utilities'],
    },
    combineRules: [
      { name: 'Combined Taxes', remove: ['Mike Taxes', 'S Corp Taxes'], removePersonal: [] },
      { name: 'Combined Car Payments', remove: [], removePersonal: ['Mike:Car Payment', 'Brenna:Car Payment'] },
      { name: 'Combined Credit Cards', remove: [], removePersonal: ['Mike:Credit Card'] },
    ],
  };
}

// ========== PERSISTENCE ==========
let DATA;

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      DATA = JSON.parse(saved);
      // Ensure all keys exist (in case we add new ones later)
      const defaults = getDefaults();
      for (const key in defaults) {
        if (!(key in DATA)) DATA[key] = defaults[key];
      }
      return;
    }
  } catch (e) { console.warn('Could not load saved data:', e); }
  DATA = getDefaults();
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    flashSave();
  } catch (e) { console.warn('Could not save data:', e); }
}

function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'finance_dashboard_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Basic validation
      if (imported.income && imported.monthlyBills && imported.debt) {
        DATA = imported;
        saveData();
        render();
      } else {
        alert('Invalid backup file format.');
      }
    } catch (err) { alert('Could not read file: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmReset() {
  document.getElementById('confirmOverlay').classList.add('active');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
}
function doReset() {
  DATA = getDefaults();
  saveData();
  render();
  closeConfirm();
}

// ========== COMPUTED ==========
function compute() {
  const c = {};
  c.incomeTotal = DATA.income.reduce((s, i) => s + i.value, 0);
  c.jointBills = DATA.monthlyBills.reduce((s, i) => s + i.value, 0);
  c.mikeBills = DATA.mikePersonal.reduce((s, i) => s + i.value, 0);
  c.brennaBills = DATA.brennaPersonal.reduce((s, i) => s + i.value, 0);
  c.totalBills = c.jointBills + c.mikeBills + c.brennaBills;
  c.remaining = c.incomeTotal - c.totalBills;
  c.debtBalance = DATA.debt.reduce((s, d) => s + d.balance, 0);
  c.debtPayments = DATA.debt.reduce((s, d) => s + d.payment, 0);
  c.assetsTotal = DATA.assets.reduce((s, a) => s + a.value, 0);
  DATA.properties.forEach(p => { p.equity = (Number(p.market) || 0) - (Number(p.mortgage) || 0); });
  c.totalMortgage = DATA.properties.reduce((s, p) => s + (Number(p.mortgage) || 0), 0);
  c.totalMarket = DATA.properties.reduce((s, p) => s + (Number(p.market) || 0), 0);
  c.totalEquity = DATA.properties.reduce((s, p) => s + p.equity, 0);
  const ballardMort = 1624, ballardRent = 2080;
  c.rentalLoss = Math.max(0, ballardMort - ballardRent * 0.75);
  c.dtiDebt = c.debtPayments + 4074 + c.rentalLoss;
  c.dtiIncome = c.incomeTotal - ballardRent;
  c.dti = c.dtiDebt / c.dtiIncome * 100;
  c.netWorth = c.totalEquity + c.assetsTotal - c.debtBalance;

  const billMap = {};
  DATA.monthlyBills.forEach(b => billMap[b.name] = b.value);
  const personalNonDebt = DATA.mikePersonal.filter(b => !['Car Payment','Credit Card'].includes(b.name)).reduce((s,b)=>s+b.value,0)
    + DATA.brennaPersonal.filter(b => !['Car Payment'].includes(b.name)).reduce((s,b)=>s+b.value,0);
  const catColors = ['#38bdf8','#f472b6','#fb923c','#f87171','#fbbf24','#a78bfa','#e879f9','#67e8f9'];
  c.categories = [];
  Object.entries(DATA.spendingCategories).forEach(([cat, items], i) => {
    let val = 0;
    if (items[0]==='_DEBT_TOTAL_') val = c.debtPayments;
    else if (items[0]==='_PERSONAL_NON_DEBT_') val = personalNonDebt;
    else items.forEach(n => { if (billMap[n]) val += billMap[n]; });
    c.categories.push({ name: cat, value: val, color: catColors[i%catColors.length] });
  });

  const allBills = [...DATA.monthlyBills.map(b=>({...b})), ...DATA.mikePersonal.map(b=>({name:'Mike:'+b.name, value:b.value})), ...DATA.brennaPersonal.map(b=>({name:'Brenna:'+b.name, value:b.value}))];
  const excludeNames = new Set();
  const combinedEntries = [];
  DATA.combineRules.forEach(rule => {
    let total = 0;
    [...rule.remove, ...rule.removePersonal].forEach(src => {
      const found = allBills.find(b => b.name === src);
      if (found) { total += found.value; excludeNames.add(src); }
    });
    if (total > 0) combinedEntries.push({ name: rule.name, value: total });
  });
  c.topBills = [...allBills.filter(b => !excludeNames.has(b.name)), ...combinedEntries].sort((a,b) => b.value - a.value).slice(0, 16);
  return c;
}

// ========== CHART HELPERS ==========
function createDonut(data, total, centerLabel, colors) {
  const cx=100,cy=100,r=78,stroke=22,circ=2*Math.PI*r;
  let offset=0, paths='';
  data.forEach((item,i) => {
    const dash=(item.value/total)*circ, gap=circ-dash;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" opacity="0.9"/>`;
    offset+=dash;
  });
  return `<svg class="donut-svg" viewBox="0 0 200 200"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="${stroke}"/>${paths}<text class="donut-center-text" x="${cx}" y="${cy-6}" text-anchor="middle" fill="#e8eaf0" font-size="16" font-weight="700">${fmt(total)}</text><text class="donut-center-text" x="${cx}" y="${cy+12}" text-anchor="middle" fill="#7a8299" font-size="9">${centerLabel}</text></svg>`;
}
function createLegend(data, colors) {
  return `<div class="legend">${data.map((item,i)=>`<div class="legend-item"><div class="legend-left"><div class="legend-color" style="background:${colors[i%colors.length]}"></div><span>${item.name}</span></div><span class="legend-value">${fmt(item.value)}</span></div>`).join('')}</div>`;
}
function editBtn(section) {
  return `<button class="edit-btn" onclick="openEdit('${section}')">${pencilSvg} Edit</button>`;
}
function addCard(grid, extra, html) {
  const d=document.createElement('div'); d.className='card'+(extra?' '+extra:''); d.innerHTML=html; grid.appendChild(d);
}

// ========== RENDER ==========
function render() {
  const c = compute();
  const kpiRow = document.getElementById('kpiRow');
  const grid = document.getElementById('chartGrid');
  kpiRow.innerHTML = ''; grid.innerHTML = '';

  [{l:'Joint Monthly Income',v:fmt(c.incomeTotal),s:'All sources combined'},
   {l:'Total Monthly Bills',v:fmtD(c.totalBills),s:'Joint + personal bills'},
   {l:'Remaining After Bills',v:fmt(Math.round(c.remaining)),s:'Discretionary cashflow',cls:'positive'},
   {l:'Debt-to-Income (UW)',v:c.dti.toFixed(1)+'%',s:c.dti>43?'Above 43% guideline':'Within 43% guideline',cls:c.dti>43?'negative':'positive'},
   {l:'Total Debt',v:fmt(c.debtBalance),s:'Consumer + credit',cls:'negative'},
   {l:'Est. Net Worth',v:fmt(c.netWorth),s:'Equity + assets − debt',cls:'positive'},
  ].forEach((k,i) => {
    const d=document.createElement('div'); d.className='kpi'; d.style.animationDelay=(i*0.06)+'s';
    d.innerHTML=`<div class="kpi-label">${k.l}</div><div class="kpi-value ${k.cls||''}">${k.v}</div><div class="kpi-sub">${k.s}</div>`;
    kpiRow.appendChild(d);
  });

  const ic=['#4ade80','#38bdf8','#fbbf24','#a78bfa'];
  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#4ade80"></div>Income Breakdown</div>${editBtn('income')}</div><div class="donut-container">${createDonut(DATA.income,c.incomeTotal,'Monthly',ic)}${createLegend(DATA.income,ic)}</div>`);

  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#38bdf8"></div>Spending by Category</div></div><div class="donut-container">${createDonut(c.categories,c.totalBills,'Monthly',c.categories.map(x=>x.color))}${createLegend(c.categories,c.categories.map(x=>x.color))}</div>`);

  const uitData=[{name:'Taxes',value:c.categories.find(x=>x.name==='Taxes')?.value||0},{name:'Insurance',value:c.categories.find(x=>x.name==='Insurance')?.value||0},{name:'Utilities',value:c.categories.find(x=>x.name==='Utilities')?.value||0},{name:'Investments',value:c.categories.find(x=>x.name==='Investments')?.value||0}];
  const uitT=uitData.reduce((s,x)=>s+x.value,0), uitC=['#f472b6','#fbbf24','#67e8f9','#a78bfa'];
  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#f472b6"></div>Taxes · Insurance · Utilities · Investments</div></div><div class="donut-container">${createDonut(uitData,uitT,'Monthly',uitC)}${createLegend(uitData,uitC)}</div>`);

  const dv=c.dti, ga=Math.min((dv/100)*180,180), rad=a=>(a*Math.PI)/180;
  const nx=110+85*Math.cos(rad(180+ga)), ny=100+85*Math.sin(rad(180+ga));
  const gc=dv>50?'#f87171':dv>43?'#fbbf24':'#4ade80';
  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:${gc}"></div>Debt-to-Income Ratio</div></div>
    <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 220 130"><path d="M 25 100 A 85 85 0 0 1 195 100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="16" stroke-linecap="round"/><path d="M 25 100 A 85 85 0 0 1 195 100" fill="none" stroke="url(#gg)" stroke-width="16" stroke-linecap="round" stroke-dasharray="${(ga/180)*267} 267"/><defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="50%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f87171"/></linearGradient></defs><circle cx="${nx}" cy="${ny}" r="6" fill="${gc}" stroke="var(--bg)" stroke-width="2"/><text x="110" y="92" text-anchor="middle" fill="${gc}" font-size="28" font-weight="700" font-family="DM Sans">${dv.toFixed(1)}%</text><text x="110" y="110" text-anchor="middle" fill="#7a8299" font-size="10" font-family="DM Sans">DTI RATIO</text><text x="25" y="120" fill="#7a8299" font-size="9">0%</text><text x="182" y="120" fill="#7a8299" font-size="9">100%</text></svg>
    <div class="dti-breakdown"><div class="dti-item"><div class="dti-item-label">Monthly Debt (UW)</div><div class="dti-item-value negative">${fmt(c.dtiDebt)}</div></div><div class="dti-item"><div class="dti-item-label">Qualifying Income</div><div class="dti-item-value positive">${fmt(c.dtiIncome)}</div></div><div class="dti-item"><div class="dti-item-label">Recommended Max</div><div class="dti-item-value">43%</div></div><div class="dti-item"><div class="dti-item-label">Rental Net Loss</div><div class="dti-item-value" style="color:var(--text-muted)">${fmt(c.rentalLoss)}/mo</div></div></div></div>`);

  const md=Math.max(...DATA.debt.map(d=>d.balance)), dc=['#f87171','#fb923c','#fbbf24','#e879f9','#f9a8d4','#67e8f9','#c4b5fd'];
  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#f87171"></div>Debt — Balance: ${fmt(c.debtBalance)} · Payments: ${fmt(c.debtPayments)}/mo</div>${editBtn('debt')}</div><div class="bar-chart">${DATA.debt.map((d,i)=>`<div class="bar-row"><div class="bar-label">${d.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(d.balance/md*100,3)}%;background:${dc[i%dc.length]}">${fmt(d.balance)}</div></div><div class="bar-amount">${fmt(d.payment)}/mo</div></div>`).join('')}</div>`);

  const ma=Math.max(...DATA.assets.map(a=>a.value));
  addCard(grid,'',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#4ade80"></div>Financial Assets — Total: ${fmt(c.assetsTotal)}</div>${editBtn('assets')}</div><div class="bar-chart">${DATA.assets.map((a,i)=>`<div class="bar-row"><div class="bar-label">${a.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(a.value/ma*100,3)}%;background:${palette[i%palette.length]}">${fmt(a.value)}</div></div></div>`).join('')}</div>`);

  addCard(grid,'full-width',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#38bdf8"></div>Real Estate — Market: ${fmt(c.totalMarket)}</div>${editBtn('properties')}</div><div class="property-grid">${DATA.properties.map((p,i)=>{const ep=(p.equity/p.market*100).toFixed(0),co=i===0?'#4ade80':'#38bdf8';return `<div class="property-card"><div class="property-name">${p.name}</div><div class="property-row"><span>Mortgage</span><span class="negative">${fmt(p.mortgage)}</span></div><div class="property-row"><span>Appraised</span><span>${fmt(p.appraised)}</span></div><div class="property-row"><span>Market Value</span><span>${fmt(p.market)}</span></div><div class="property-row"><span>Equity</span><span class="positive">${fmt(p.equity)} (${ep}%)</span></div><div class="equity-bar"><div class="equity-fill" style="width:${ep}%;background:${co}"></div></div></div>`;}).join('')}<div class="property-card" style="border-color:rgba(74,222,128,0.2)"><div class="property-name" style="color:#4ade80">Portfolio Summary</div><div class="property-row"><span>Total Mortgages</span><span class="negative">${fmt(c.totalMortgage)}</span></div><div class="property-row"><span>Total Market</span><span>${fmt(c.totalMarket)}</span></div><div class="property-row"><span>Total Equity</span><span class="positive">${fmt(c.totalEquity)} (${c.totalMarket ? (c.totalEquity/c.totalMarket*100).toFixed(0) : 0}%)</span></div><div class="equity-bar"><div class="equity-fill" style="width:${(c.totalEquity/c.totalMarket*100).toFixed(0)}%;background:linear-gradient(90deg,#4ade80,#38bdf8)"></div></div></div></div>`);

  const mb=Math.max(...c.topBills.map(b=>b.value));
  addCard(grid,'full-width',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#fbbf24"></div>Top Monthly Expenses — Total: ${fmtD(c.totalBills)}</div>${editBtn('bills')}</div><div class="bar-chart">${c.topBills.map((b,i)=>`<div class="bar-row"><div class="bar-label">${b.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(b.value/mb*100,3)}%;background:${palette[i%palette.length]}">${fmt(b.value)}</div></div></div>`).join('')}</div>`);

  const allocData=[...c.categories,{name:'Remaining',value:Math.max(0,c.remaining)}];
  const ac=['#38bdf8','#f472b6','#fb923c','#f87171','#fbbf24','#a78bfa','#e879f9','#67e8f9','#4ade80'];
  addCard(grid,'full-width',`<div class="card-header"><div class="card-title"><div class="dot" style="background:#a78bfa"></div>Income Allocation — ${fmt(c.incomeTotal)}/mo</div></div><div class="stacked-bar-section"><div class="stacked-bar-outer">${allocData.map((d,i)=>{const p=(d.value/c.incomeTotal*100).toFixed(1);return `<div style="width:${p}%;background:${ac[i]}" title="${d.name} ${p}%">${p>3.5?p+'%':''}</div>`;}).join('')}</div><div class="legend" style="flex-direction:row;flex-wrap:wrap;gap:14px;">${allocData.map((d,i)=>`<div class="legend-item" style="border:0;gap:6px"><div class="legend-left"><div class="legend-color" style="background:${ac[i]}"></div><span>${d.name}</span></div><span class="legend-value" style="font-size:0.75rem">${fmt(Math.round(d.value))} · ${(d.value/c.incomeTotal*100).toFixed(1)}%</span></div>`).join('')}</div></div>`);
}

// ========== EDIT MODAL ==========
let currentEditSection = '';

function openEdit(section) {
  currentEditSection = section;
  const modal = document.getElementById('modalContent');
  let html = `<h2>${pencilSvg} Edit ${({income:'Income',bills:'Monthly Bills',debt:'Debt Accounts',assets:'Financial Assets',properties:'Real Estate'})[section]}</h2>`;
  if (section === 'bills') {
    html += editTable('Joint Household Bills', 'monthlyBills', ['name','value'], ['Bill Name','Amount']);
    html += editTable("Mike's Personal Bills", 'mikePersonal', ['name','value'], ['Bill Name','Amount']);
    html += editTable("Brenna's Personal Bills", 'brennaPersonal', ['name','value'], ['Bill Name','Amount']);
  } else if (section === 'debt') {
    html += editTable(null, 'debt', ['name','balance','payment'], ['Account','Balance','Payment']);
  } else if (section === 'properties') {
    DATA.properties.forEach((p, idx) => {
      html += `<div class="edit-section-label">${p.name||'Property '+(idx+1)}</div>`;
      ['name','mortgage','appraised','market'].forEach(f => {
        html += `<div class="edit-row"><span style="flex:1;font-size:0.78rem;color:var(--text-muted);text-transform:capitalize">${f}</span><input class="edit-val" data-s="properties" data-i="${idx}" data-f="${f}" value="${p[f]}"/></div>`;
      });
    });
    html += `<button class="btn btn-add" onclick="addRow('properties')">+ Add Property</button>`;
  } else {
    html += editTable(null, section==='income'?'income':'assets', ['name','value'], ['Name','Amount']);
  }
  html += `<div class="modal-actions"><button class="btn btn-cancel" onclick="closeEdit()">Cancel</button><button class="btn btn-save" onclick="saveEdit()">Save & Update</button></div>`;
  modal.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function editTable(label, key, fields, labels) {
  let h = '';
  if (label) h += `<div class="edit-section-label">${label}</div>`;
  h += `<div class="edit-header">${labels.map((l,i)=>`<div class="${i===0?'eh-name':'eh-val'}">${l}</div>`).join('')}<div class="eh-del"></div></div>`;
  DATA[key].forEach((item, idx) => {
    h += `<div class="edit-row">${fields.map((f,i)=>`<input class="${i===0?'edit-name':'edit-val'}" data-s="${key}" data-i="${idx}" data-f="${f}" value="${item[f]}"/>`).join('')}<button class="btn-del" onclick="delRow('${key}',${idx})">×</button></div>`;
  });
  h += `<button class="btn btn-add" onclick="addRow('${key}')">+ Add Row</button>`;
  return h;
}

function addRow(key) {
  const t = {income:{name:'New',value:0},monthlyBills:{name:'New',value:0},mikePersonal:{name:'New',value:0},brennaPersonal:{name:'New',value:0},debt:{name:'New',balance:0,payment:0},assets:{name:'New',value:0},properties:{name:'New',mortgage:0,appraised:0,market:0}};
  DATA[key].push({...t[key]});
  openEdit(currentEditSection);
}

function delRow(key, idx) {
  DATA[key].splice(idx, 1);
  openEdit(currentEditSection);
}

function saveEdit() {
  document.querySelectorAll('.modal input[data-s]').forEach(input => {
    const s=input.dataset.s, i=parseInt(input.dataset.i), f=input.dataset.f;
    if (DATA[s]&&DATA[s][i]) DATA[s][i][f] = f==='name' ? input.value : (parseFloat(input.value)||0);
  });
  closeEdit();
  saveData();
  render();
}

function closeEdit() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeEdit(); });
document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeConfirm(); });

// ========== INIT ==========
loadData();
render();
</script>
